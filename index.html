<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>守岸人 - 语音通话</title>
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: #e8e8e8;
        }
        .container { text-align: center; padding: 20px; max-width: 400px; width: 100%; }
        .avatar {
            width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, #4a9eff 0%, #7c3aed 100%);
            margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 40px rgba(74, 158, 255, 0.3);
        }
        .avatar.speaking { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .status { font-size: 16px; margin-bottom: 20px; color: #888; }
        .status.active { color: #4ade80; }
        .call-btn {
            width: 70px; height: 70px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white; font-size: 28px; cursor: pointer;
            transition: all 0.3s; box-shadow: 0 5px 20px rgba(74, 222, 128, 0.4);
        }
        .call-btn:hover { transform: scale(1.1); }
        .call-btn.active {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.4);
        }
        .transcript {
            margin-top: 20px; padding: 15px;
            background: rgba(255,255,255,0.05); border-radius: 12px;
            min-height: 80px; text-align: left; font-size: 14px;
            max-height: 200px; overflow-y: auto;
        }
        .transcript p { margin: 5px 0; }
        .user { color: #4ade80; }
        .ai { color: #4a9eff; }
        .settings { margin-top: 15px; }
        .settings input {
            width: 100%; padding: 10px; margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            background: rgba(255,255,255,0.05); color: #e8e8e8;
            font-size: 14px;
        }
        .hint { font-size: 11px; color: #555; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar" id="avatar">✨</div>
        <div class="status" id="status">点击麦克风开始通话</div>
        <button class="call-btn" id="callBtn">🎤</button>
        <div class="transcript" id="transcript"></div>
        <div class="settings">
            <input type="text" id="appId" placeholder="讯飞 AppID">
            <input type="password" id="apiKey" placeholder="讯飞 API Key">
            <input type="password" id="apiSecret" placeholder="讯飞 API Secret">
        </div>
        <p class="hint">讯飞开放平台: https://www.xfyun.cn<br>实时语音转写 + 语音合成</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
